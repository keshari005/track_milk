<!DOCTYPE html>
<html>
<head>
    <title>Milk Shop Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 10px;
            background: #f2f2f2;
        }

        h2 {
            text-align: center;
        }

        .item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 16px;
            font-weight: bold;
        }

        .price {
            font-size: 13px;
            color: gray;
        }

        .controls {
            display: flex;
            align-items: center;
        }

        .btn {
            width: 35px;
            height: 35px;
            font-size: 18px;
            border: none;
            border-radius: 50%;
            background: #2196F3;
            color: white;
            margin: 0 5px;
        }

        .qty {
            width: 50px;
            text-align: center;
            font-size: 16px;
            padding: 5px;
        }

        .total {
            font-size: 22px;
            text-align: center;
            margin-top: 15px;
            color: green;
            font-weight: bold;
        }

        button.main {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
        }

        .print-btn { background: #4CAF50; color: white; }
        .reset-btn { background: #f44336; color: white; }
    </style>
</head>

<body>

<h2>🥛 Milk Shop</h2>

<div id="items"></div>

<div class="total">
    Total: ₹ <span id="total">0.00</span>
</div>

<button class="main print-btn" onclick="printBill()">🧾 Print Bill</button>
<button class="main reset-btn" onclick="resetAll()">🔄 Reset</button>

<script>
const data = [
    {name: "Full Cream (KG)", price: 68},
    {name: "Cow (KG)", price: 58},
    {name: "Choti Dahi (KG)", price: 45},
    {name: "Medium Dahi (KG)", price: 90},
    {name: "Badi Dahi (KG)", price: 66},
    {name: "Plain Lassi (KG)", price: 19},
    {name: "Tadka Lassi (KG)", price: 19},
    {name: "Sweet Lassi (KG)", price: 19},
    {name: "Baccha Dudh (KG)", price: 45},
    {name: "Botal Lassi (per pice)", price: 18}
];

const container = document.getElementById("items");

data.forEach((item, i) => {
    container.innerHTML += `
        <div class="item">
            <div>
                <div class="name">${item.name}</div>
                <div class="price">₹${item.price}</div>
            </div>

            <div class="controls">
                <button class="btn" onclick="changeQty(${i}, -1)">-</button>
                <input type="number" id="q${i}" class="qty" value="0" min="0" oninput="calculate()">
                <button class="btn" onclick="changeQty(${i}, 1)">+</button>
            </div>
        </div>
    `;
});

function changeQty(i, change) {
    let input = document.getElementById(`q${i}`);
    let value = parseFloat(input.value) || 0;

    value += change;
    if (value < 0) value = 0;

    input.value = value;
    calculate();
}

function calculate() {
    let total = 0;

    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;
        total += qty * item.price;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

function printBill() {
    let bill = "Milk Shop Bill\n\n";
    let total = 0;

    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;

        if (qty > 0) {
            let amt = qty * item.price;
            bill += `${item.name} x ${qty} = ₹${amt}\n`;
            total += amt;
        }
    });

    bill += "\nTotal: ₹" + total.toFixed(2);

    const printContent = `
        <html>
        <body>
        <h3>Milk Shop Bill</h3>
        <pre>${bill}</pre>
        </body>
        </html>
    `;

    const iframe = document.createElement("iframe");
    document.body.appendChild(iframe);

    iframe.style.display = "none";

    iframe.contentWindow.document.open();
    iframe.contentWindow.document.write(printContent);
    iframe.contentWindow.document.close();

    iframe.contentWindow.print();
}

function resetAll() {
    data.forEach((item, i) => {
        document.getElementById(`q${i}`).value = 0;
    });
    calculate();
}
</script>

</body>
</html>
