<!DOCTYPE html>
<html>
<head>
    <title>Milk Shop Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 10px;
            background: #121212;
            color: #fff;
        }

        h2 {
            text-align: center;
            color: #00ffcc;
        }

        .date {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .item {
            background: #1e1e1e;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,204,0.15);
        }

        .name {
            font-size: 16px;
            font-weight: bold;
        }

        .price {
            font-size: 14px;
            color: #00ffcc;
            font-weight: bold;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            align-items: center;
        }

        .btn {
            width: 38px;
            height: 38px;
            font-size: 18px;
            border: none;
            border-radius: 50%;
            background: #00ffcc;
            color: black;
            margin: 0 6px;
            font-weight: bold;
        }

        .qty {
            width: 60px;
            text-align: center;
            font-size: 16px;
            padding: 6px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .total {
            font-size: 24px;
            text-align: center;
            margin-top: 20px;
            color: #00ffcc;
            font-weight: bold;
        }

        button.main {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
        }

        .print-btn {
            background: linear-gradient(45deg, #00ffcc, #00cc99);
            color: black;
        }

        .reset-btn {
            background: #ff4444;
            color: white;
        }
    </style>
</head>

<body>

<h2>Sonu 🥛 Milk Shop</h2>

<div class="date">
    Date: <span id="date"></span>
</div>

<div id="items"></div>

<div class="total">
    Total: ₹ <span id="total">0.00</span>
</div>

<button class="main print-btn" onclick="printBill()">🧾 Print Bill</button>
<button class="main reset-btn" onclick="resetAll()">🔄 Reset</button>

<script>

// Date set
function setDate() {
    const now = new Date();
    document.getElementById("date").innerText = now.toLocaleString();
}
setDate();

// Data
const data = [
    {name: "Full Cream (KG)", price: 68},
    {name: "Cow (KG)", price: 58},
    {name: "Choti Dahi (KG)", price: 45},
    {name: "Medium Dahi (KG)", price: 90},
    {name: "Badi Dahi (KG)", price: 66},
    {name: "Plain Lassi (KG)", price: 19},
    {name: "Tadka Lassi (KG)", price: 19},
    {name: "Sweet Lassi (KG)", price: 19},
    {name: "Baccha Dudh (KG)", price: 45},
    {name: "Botal Lassi (per piece)", price: 18}
];

const container = document.getElementById("items");

// Load items
data.forEach((item, i) => {
    container.innerHTML += `
        <div class="item">
            <div>
                <div class="name">${item.name}</div>
                <div class="price">₹${item.price}</div>
            </div>

            <div class="controls">
                <button class="btn" onclick="changeQty(${i}, -1)">-</button>
                <input type="number" id="q${i}" class="qty" value="0" min="0" step="0.5" oninput="calculate()">
                <button class="btn" onclick="changeQty(${i}, 1)">+</button>
            </div>
        </div>
    `;
});

// Change qty
function changeQty(i, change) {
    let input = document.getElementById(`q${i}`);
    let value = parseFloat(input.value) || 0;

    value += change;
    if (value < 0) value = 0;

    input.value = value;
    calculate();
}

// Calculate total
function calculate() {
    let total = 0;

    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;
        total += qty * item.price;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

// Print bill
function printBill() {
    let now = new Date().toLocaleString();
    let bill = "Milk Shop Bill\nDate: " + now + "\n\n";
    let total = 0;

    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;

        if (qty > 0) {
            let amt = qty * item.price;
            bill += `${item.name} x ${qty} = ₹${amt}\n`;
            total += amt;
        }
    });

    bill += "\nTotal: ₹" + total.toFixed(2);

    const printContent = `
        <html>
        <body style="font-family:Arial;">
        <h3>Sonu Milk Shop</h3>
        <p>Date: ${now}</p>
        <pre>${bill}</pre>
        </body>
        </html>
    `;

    const iframe = document.createElement("iframe");
    document.body.appendChild(iframe);
    iframe.style.display = "none";

    iframe.contentWindow.document.open();
    iframe.contentWindow.document.write(printContent);
    iframe.contentWindow.document.close();

    iframe.contentWindow.print();
}

// Reset
function resetAll() {
    data.forEach((item, i) => {
        document.getElementById(`q${i}`).value = 0;
    });
    calculate();
}

</script>

</body>
</html>
