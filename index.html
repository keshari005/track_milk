<!DOCTYPE html>
<html>
<head>
    <title>Milk Shop Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 8px;
            background: #121212;
            color: #fff;
        }

        h2 {
            text-align: center;
            color: #00ffcc;
            font-size: 18px;
            margin: 5px 0;
        }

        .date {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .item {
            background: #1e1e1e;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .name {
            font-size: 13px;
            font-weight: bold;
        }

        .price {
            font-size: 12px;
            color: #00ffcc;
        }

        .btn {
            width: 28px;
            height: 28px;
            font-size: 16px;
            border-radius: 50%;
            border: none;
            background: #00ffcc;
        }

        .qty {
            width: 40px;
            text-align: center;
            font-size: 14px;
        }

        .total {
            font-size: 18px;
            text-align: center;
            margin-top: 10px;
            color: #00ffcc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        .print-btn { background: #00cc99; }
        .reset-btn { background: #ff4444; color: white; }
    </style>
</head>

<body>

<h2>🥛 Sonu Milk Shop</h2>

<div class="date" id="date"></div>

<div id="items"></div>

<div class="total">
    Total: ₹ <span id="total">0.00</span>
</div>

<button class="print-btn" onclick="printBill()">🧾 Print Bill</button>
<button class="reset-btn" onclick="resetAll()">Reset</button>

<script>

// Set Date UI
function setDate() {
    const now = new Date();
    document.getElementById("date").innerText = now.toLocaleString();
}
setDate();

// Data
const data = [
    {name: "Full Cream", price: 68},
    {name: "Cow", price: 58},
    {name: "Choti Dahi", price: 45},
    {name: "Medium Dahi", price: 90},
    {name: "Badi Dahi", price: 66},
    {name: "Plain Lassi", price: 19},
    {name: "Sweet Lassi", price: 19},
    {name: "Baccha Dudh", price: 45},
    {name: "Bottle Lassi", price: 18}
];

const container = document.getElementById("items");

// Load Items
data.forEach((item, i) => {
    container.innerHTML += `
        <div class="item">
            <div>
                <div class="name">${item.name}</div>
                <div class="price">₹${item.price}</div>
            </div>

            <div>
                <button class="btn" onclick="changeQty(${i}, -1)">-</button>
                <input type="number" id="q${i}" class="qty" value="0" oninput="calculate()">
                <button class="btn" onclick="changeQty(${i}, 1)">+</button>
            </div>
        </div>
    `;
});

// Change Qty
function changeQty(i, change) {
    let el = document.getElementById(`q${i}`);
    let val = parseFloat(el.value) || 0;
    val += change;
    if (val < 0) val = 0;
    el.value = val;
    calculate();
}

// Calculate
function calculate() {
    let total = 0;
    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;
        total += qty * item.price;
    });
    document.getElementById("total").innerText = total.toFixed(2);
}

// Print Bill (ONE PAGE FIX)
function printBill() {
    let now = new Date().toLocaleString();
    let total = 0;

    let rows = "";

    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;
        if (qty > 0) {
            let amt = qty * item.price;
            total += amt;
            rows += `<tr>
                        <td>${item.name}</td>
                        <td>${qty}</td>
                        <td>₹${amt}</td>
                     </tr>`;
        }
    });

    const html = `
    <html>
    <head>
        <style>
            body { font-family: Arial; padding: 10px; }
            h3 { text-align:center; margin:5px; }
            table { width:100%; border-collapse: collapse; font-size:14px; }
            td, th { border-bottom:1px dashed #000; padding:4px; text-align:left; }
            .total { font-weight:bold; font-size:16px; }
        </style>
    </head>
    <body>

    <h3>Sonu Milk Shop</h3>
    <p>Date: ${now}</p>

    <table>
        <tr><th>Item</th><th>Qty</th><th>Amount</th></tr>
        ${rows}
    </table>

    <p class="total">Total: ₹${total.toFixed(2)}</p>

    </body>
    </html>
    `;

    const win = window.open("", "", "width=300,height=600");
    win.document.write(html);
    win.document.close();
    win.print();
}

// Reset
function resetAll() {
    data.forEach((_, i) => {
        document.getElementById(`q${i}`).value = 0;
    });
    calculate();
}

</script>

</body>
</html>
