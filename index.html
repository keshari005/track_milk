<!DOCTYPE html>
<html>
<head>
    <title>Milk Shop Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 8px;
            background: #121212;
            color: #fff;
        }

        h2 {
            text-align: center;
            color: #00ffcc;
            font-size: 18px;
        }

        .date {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .item {
            background: #1e1e1e;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left { flex: 1; }

        .name {
            font-size: 13px;
            font-weight: bold;
        }

        .price {
            font-size: 12px;
            color: #00ffcc;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .btn {
            width: 28px;
            height: 28px;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            background: #00ffcc;
        }

        .qty {
            width: 42px;
            height: 28px;
            font-size: 16px;
            text-align: center;
            border-radius: 6px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
        }

        .total {
            font-size: 18px;
            text-align: center;
            margin-top: 10px;
            color: #00ffcc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        .print-btn { background: #00cc99; }
        .reset-btn { background: #ff4444; color: white; }

        /* PRINT STYLE */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                color: #000;
                background: #fff;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<h2>🥛 Sonu Milk Shop</h2>
<div class="date" id="date"></div>

<div id="items"></div>

<div class="total">
    Total: ₹ <span id="total">0.00</span>
</div>

<button class="print-btn" onclick="printBill()">🧾 Print / Share Bill</button>
<button class="reset-btn" onclick="resetAll()">Reset</button>

<!-- 🔥 Hidden Print Area -->
<div id="printArea" style="display:none;"></div>

<script>

// Date
document.getElementById("date").innerText = new Date().toLocaleString();

// Data
const data = [
    {name: "Full Cream", price: 68},
    {name: "Cow Milk", price: 58},
    {name: "Choti Dahi", price: 45},
    {name: "Medium Dahi", price: 95},
    {name: "Badi Dahi", price: 66},
    {name: "Plain Lassi", price: 19},
    {name: "Tadka Lassi", price: 19},
    {name: "Sweet Lassi", price: 19},
    {name: "Baccha Dudh", price: 45},
    {name: "Bottle Lassi", price: 18}
];

const container = document.getElementById("items");

// Load items
data.forEach((item, i) => {
    container.innerHTML += `
        <div class="item">
            <div class="left">
                <div class="name">${item.name}</div>
                <div class="price">₹${item.price}</div>
            </div>

            <div class="controls">
                <button class="btn" onclick="changeQty(${i}, -1)">−</button>
                <input type="number" id="q${i}" class="qty" value="0" oninput="calculate()">
                <button class="btn" onclick="changeQty(${i}, 1)">+</button>
            </div>
        </div>
    `;
});

// Change qty
function changeQty(i, change) {
    let el = document.getElementById(`q${i}`);
    let val = parseFloat(el.value) || 0;
    val += change;
    if (val < 0) val = 0;
    el.value = val;
    calculate();
}

// Calculate
function calculate() {
    let total = 0;
    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;
        total += qty * item.price;
    });
    document.getElementById("total").innerText = total.toFixed(2);
}

// 🔥 PRINT FUNCTION (NO REDIRECT)
function printBill() {
    let now = new Date().toLocaleString();
    let total = 0;
    let rows = "";

    data.forEach((item, i) => {
        let qty = parseFloat(document.getElementById(`q${i}`).value) || 0;
        if (qty > 0) {
            let amt = qty * item.price;
            total += amt;
            rows += `
                <tr>
                    <td>${item.name}</td>
                    <td>${qty}</td>
                    <td>₹${amt.toFixed(2)}</td>
                </tr>`;
        }
    });

    const billHTML = `
        <h3 style="text-align:center;">Sonu Milk Shop</h3>
        <p>Date: ${now}</p>
        <table style="width:100%; border-collapse: collapse;">
            <tr>
                <th style="border-bottom:1px dashed;">Item</th>
                <th style="border-bottom:1px dashed;">Qty</th>
                <th style="border-bottom:1px dashed;">Amount</th>
            </tr>
            ${rows}
        </table>
        <h3>Total: ₹${total.toFixed(2)}</h3>
        <p style="text-align:center;">🙏 Thank You Visit Again</p>
    `;

    const printDiv = document.getElementById("printArea");
    printDiv.innerHTML = billHTML;
    printDiv.style.display = "block";

    window.print();

    // वापस hide (no reload needed)
    setTimeout(() => {
        printDiv.style.display = "none";
    }, 500);
}

// Reset
function resetAll() {
    data.forEach((_, i) => {
        document.getElementById(`q${i}`).value = 0;
    });
    calculate();
}

</script>

</body>
</html>
